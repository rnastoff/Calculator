<head>
	<meta http-equiv="Content-Type" content="text/html; charset=UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<link rel="stylesheet" type="text/css" href="style.css">
  
</head>

<body>
  
  <div class="container">
        
    <div class="calculator">
      <h1>FCC Calculator</h1>
      <div class="screen"></div>
      
      <div class="row1">
        <button type="button" class="button-left" id="ce">CE</button>     
        <button type="button" id="on">ON</button>
        <button type="button" class="op" id ="divide">/</button>
      </div>
      
      <div class="row2">
        <button type="button" class="button-left num" id="seven">7</button>
        <button type="button" class="num" id="eight">8</button>
        <button type="button" class="num" id="nine">9</button>
        <button type="button" class="op" id="multiply">x</button>
      </div>
      
      <div class="row3">
        <button type="button" class="button-left num" id="four">4</button>
        <button type="button" class="num" id="five">5</button>
        <button type="button" class="num" id="six">6</button>
        <button type="button" class="op" id="subtract">-</button>
      </div>
      
      <div class="row4">
        <button type="button" class="button-left num" id="one">1</button>
        <button type="button" class="num" id="two">2</button>
        <button type="button" class="num" id="three">3</button>
        <button type="button" class="op" class="num" id="plus">+</button>
      </div>
      
      <div class="row5">
        <button type="button" class="button-left" id="zero">0</button>       
        <button type="button" class="num" id="decimal">.</button>
        <button type="button" id="equals">=</button>
      </div>   
           
    </div>
    
  </div>
	
	<script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.2.1/jquery.min.js"></script>
	<script src="script.js"></script>
</body>
